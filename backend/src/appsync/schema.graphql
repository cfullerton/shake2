# Draft AppSync schema for multiplayer Texas 42.
#
# This file is wired into the CDK AppSync API definition, but the repository
# does not deploy it automatically. It keeps raw trusted events and full hand
# state server-only.

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

scalar AWSDateTime
scalar AWSJSON

type Query {
  getRoom(roomId: ID!): RoomView!
  getRoomByCode(roomCode: String!): RoomView!
  getGameSnapshot(gameId: ID!): PublicGameSnapshot!
  getMyPrivateHand(input: GetMyPrivateHandInput!): PrivateHandResponse!
  getReconnectView(input: GetReconnectViewInput!): ReconnectView!
}

type Mutation {
  createRoom(input: CreateRoomInput!): RoomView!
  joinRoom(input: JoinRoomInput!): RoomView!
  takeSeat(input: TakeSeatInput!): RoomView!
  startGame(input: StartGameInput!): StartGameResult!
  submitGameAction(input: SubmitGameActionInput!): SubmitGameActionResult!
}

type Subscription {
  onGameUpdated(gameId: ID!): SubmitGameActionResult
    @aws_subscribe(mutations: ["submitGameAction"])
}

input SubmitGameActionInput {
  gameId: ID!
  action: AWSJSON!
}

input CreateRoomInput {
  displayName: String!
}

input JoinRoomInput {
  roomCode: String!
  displayName: String!
}

input TakeSeatInput {
  roomId: ID!
  seatIndex: SeatIndex!
}

input StartGameInput {
  roomId: ID!
  targetMarks: Int
}

input GetMyPrivateHandInput {
  gameId: ID!
  seatIndex: SeatIndex!
}

input GetReconnectViewInput {
  gameId: ID!
  lastAppliedEventSequence: Int!
  snapshotVersion: Int!
  pendingActionIds: [ID!] = []
}

type SubmitGameActionResult {
  accepted: Boolean!
  committed: Boolean!
  duplicate: Boolean!
  gameId: ID
  error: BackendError
  events: [SafeGameEventSummary!]!
  snapshot: PublicGameSnapshot
}

type BackendError {
  code: String!
  message: String!
}

type PublicGameSnapshot {
  gameId: ID!
  generatedAt: AWSDateTime!
  lastEventSequence: Int!
  schemaVersion: Int!
  snapshotVersion: Int!
  phase: String!
  handCounts: SeatHandCounts
  redactedState: AWSJSON!
}

type SeatHandCounts {
  seat0: Int!
  seat1: Int!
  seat2: Int!
  seat3: Int!
}

type RoomView {
  roomId: ID!
  roomCode: String!
  status: String!
  gameId: ID
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  participantCount: Int!
  isHost: Boolean!
  viewerSeat: SeatIndex
  participants: [RoomParticipant!]!
  seats: [RoomSeat!]!
}

type RoomParticipant {
  displayName: String!
  connectionStatus: String!
  joinedAt: AWSDateTime!
  isViewer: Boolean!
}

type RoomSeat {
  seatIndex: SeatIndex!
  occupied: Boolean!
  displayName: String
  isViewer: Boolean!
}

type StartGameResult {
  room: RoomView!
  snapshot: PublicGameSnapshot!
}

type PrivateHandResponse {
  gameId: ID!
  handNumber: Int!
  seatIndex: SeatIndex!
  updatedAt: AWSDateTime!
  dominoes: [Domino!]!
}

type Domino {
  high: Int!
  low: Int!
  key: String!
}

type ReconnectView {
  acceptedPendingActionIds: [ID!]!
  rejectedPendingActions: [PendingActionRejection!]!
  unknownPendingActionIds: [ID!]!
  requiresSnapshotRefresh: Boolean!
  serverLastEventSequence: Int!
  serverSnapshotVersion: Int!
  snapshot: PublicGameSnapshot!
  privateHand: PrivateHandResponse
}

type PendingActionRejection {
  actionId: ID!
  errorCode: String!
}

type SafeGameEventSummary {
  eventId: ID!
  eventType: String!
  sequence: Int!
  actionId: ID!
  actorId: ID!
  actorSeat: SeatIndex
}

enum SeatIndex {
  SEAT_0
  SEAT_1
  SEAT_2
  SEAT_3
}
