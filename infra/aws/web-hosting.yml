AWSTemplateFormatVersion: "2010-09-09"
Description: Static S3 and CloudFront hosting for the Shake 2 Expo web build.

Parameters:
  BucketName:
    Type: String
    Default: ""
    Description: Optional globally unique bucket name. Leave blank to let CloudFormation generate one.
  GitHubOwner:
    Type: String
    Description: GitHub owner or organization that owns the repository.
  GitHubRepo:
    Type: String
    Description: GitHub repository name.
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch allowed to deploy to this hosting stack.
  GitHubOidcProviderArn:
    Type: String
    Description: Existing IAM OIDC provider ARN for https://token.actions.githubusercontent.com.

Conditions:
  HasBucketName: !Not [!Equals [!Ref BucketName, ""]]

Resources:
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasBucketName, !Ref BucketName, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  WebOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-s3-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${AWS::StackName} Shake 2 web hosting"
        CustomErrorResponses:
          - ErrorCachingMinTTL: 0
            ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCachingMinTTL: 0
            ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          TargetOriginId: s3-origin
          ViewerProtocolPolicy: redirect-to-https
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Origins:
          - DomainName: !GetAtt WebBucket.RegionalDomainName
            Id: s3-origin
            OriginAccessControlId: !GetAtt WebOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebDistribution}"

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-github-web-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOwner}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: WebDeploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ListBucket
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt WebBucket.Arn
              - Sid: WriteBucketObjects
                Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "${WebBucket.Arn}/*"
              - Sid: InvalidateDistribution
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebDistribution}"

Outputs:
  BucketName:
    Description: S3 bucket that receives the Expo web export.
    Value: !Ref WebBucket
  CloudFrontDistributionId:
    Description: CloudFront distribution ID for invalidations.
    Value: !Ref WebDistribution
  CloudFrontDomainName:
    Description: Default CloudFront hostname.
    Value: !GetAtt WebDistribution.DomainName
  GitHubActionsRoleArn:
    Description: Role ARN to store in GitHub repository variable AWS_ROLE_TO_ASSUME.
    Value: !GetAtt GitHubDeployRole.Arn
